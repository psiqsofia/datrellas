<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datrellas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            color: #9b30ff;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Lluvia de código */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.4;
        }

        .contenido {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .logo {
            width: 200px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px #9b30ff);
            animation: pulso 3s ease-in-out infinite;
        }

        @keyframes pulso {
            0%, 100% { filter: drop-shadow(0 0 20px #9b30ff); }
            50% { filter: drop-shadow(0 0 40px #bf7fff); }
        }

        .proximamente {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 8px;
            color: #9b30ff;
            text-shadow: 0 0 20px #9b30ff;
            animation: parpadeo 2s ease-in-out infinite;
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .subtexto {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #6a0dad;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="contenido">
    <img src="logo.png" alt="Datrellas" class="logo">
    <div class="proximamente">PRÓXIMAMENTE</div>
    <div class="subtexto">// algo está siendo construido...</div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = '01アイウエオdatrellasPYTHONSQLDATA{}[]<>()';
    const fontSize = 14;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#9b30ff';
        ctx.font = fontSize + 'px monospace';

        drops.forEach((y, i) => {
            const char = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(char, i * fontSize, y * fontSize);
            if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }

    setInterval(draw, 35);

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
